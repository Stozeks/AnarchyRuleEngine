name: AnarchyRuleEngine
version: '${project.version}'
main: me.stozeks.anarchyruleengine.core.AnarchyRuleEnginePlugin
api-version: '1.16'
author: Stozeks
description: A configurable rule engine for Paper 1.16.5 servers.

commands:
  are:
    description: Main AnarchyRuleEngine command.
    usage: /are <help|version|reload|give|rules|inspect|debug>
    aliases:
      - anarchyruleengine

permissions:
  anarchyruleengine.command.reload:
    description: Allows reloading AnarchyRuleEngine rules.
    default: op

  anarchyruleengine.command.give:
    description: Allows giving custom AnarchyRuleEngine items.
    default: op

  anarchyruleengine.command.inspect:
    description: Allows listing and inspecting loaded rules.
    default: op

  anarchyruleengine.command.debug:
    description: Allows toggling rule execution debug traces.
    default: op

depend:
  - WorldGuard